<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Amazon...</title>
    <!-- OpenGraph SEO meta tags for Pinterest scraper -->
    <meta property="og:title" content="Buy AOEVI Adjustable Laptop Stand with 360 Rotating Base, Stable Computer Stand for Laptop Ergonimic Foldable Laptop Riser for Desk Compatible with MacBook Pro/Air Notebook up to 16 Inches, Silver on Amazon">
    <meta property="og:description" content="Get this amazing product for only $36.99. Click to view details.">
    <meta property="og:image" content="../images/B0BY286WPR.jpg">
    <meta property="og:type" content="product">
    <meta property="og:price:amount" content="36.99">
    <meta property="og:price:currency" content="USD">
    
    <!-- Automatic HTTP refresh fallback redirect -->
    <meta http-equiv="refresh" content="1;url=https://www.amazon.com/dp/B0BY286WPR/?tag=renatspace-20">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px auto;
        }
        h2 {
            font-size: 20px;
            margin-bottom: 10px;
            font-weight: 600;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn {
            display: inline-block;
            background: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #059669;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redirecting to Amazon</h2>
        <p>Transferring you to the product listing for $36.99...</p>
        <a href="https://www.amazon.com/dp/B0BY286WPR/?tag=renatspace-20" class="btn">Click here if not redirected</a>
    </div>

    <script>
        // High-speed javascript redirect
        setTimeout(function() {
            window.location.replace("https://www.amazon.com/dp/B0BY286WPR/?tag=renatspace-20");
        }, 100);
    </script>
</body>
</html>
